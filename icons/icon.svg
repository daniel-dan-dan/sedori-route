<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5DCAA5"/>
      <stop offset="100%" stop-color="#0F6E56"/>
    </linearGradient>
  </defs>

  <!-- 背景角丸正方形（iOS風） -->
  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#bgGrad)"/>

  <!-- 地図の白背景 -->
  <rect x="80" y="80" width="352" height="352" rx="28" fill="white" opacity="0.95"/>

  <!-- 地図の道路グリッド -->
  <line x1="80" y1="200" x2="432" y2="200" stroke="#0F6E56" stroke-width="4" opacity="0.3"/>
  <line x1="80" y1="312" x2="432" y2="312" stroke="#0F6E56" stroke-width="4" opacity="0.3"/>
  <line x1="192" y1="80" x2="192" y2="432" stroke="#0F6E56" stroke-width="4" opacity="0.3"/>
  <line x1="320" y1="80" x2="320" y2="432" stroke="#0F6E56" stroke-width="4" opacity="0.3"/>

  <!-- ルートの点線（ピン1 → ピン2 → ピン3） -->
  <line x1="180" y1="180" x2="340" y2="260"
        stroke="#D85A30" stroke-width="10"
        stroke-dasharray="18 16" stroke-linecap="round"/>
  <line x1="340" y1="260" x2="240" y2="330"
        stroke="#D85A30" stroke-width="10"
        stroke-dasharray="18 16" stroke-linecap="round"/>

  <!-- ピン1（左上・スタート） -->
  <circle cx="180" cy="180" r="42" fill="#D85A30"/>
  <circle cx="180" cy="180" r="20" fill="white"/>

  <!-- ピン2（右中・中継） -->
  <circle cx="340" cy="260" r="42" fill="#D85A30"/>
  <circle cx="340" cy="260" r="20" fill="white"/>

  <!-- ピン3（中下・ゴール） -->
  <circle cx="240" cy="330" r="42" fill="#D85A30"/>
  <circle cx="240" cy="330" r="20" fill="white"/>

</svg>
