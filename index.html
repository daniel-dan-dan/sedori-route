<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#2E7D4F">
  <title>巡回ルート</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>
<body>
  <div id="app">
    <div class="loading"><div class="spinner"></div><p class="mt-8">読み込み中...</p></div>
  </div>

  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-item active" data-view="home">
      <span class="icon">&#x1f3e0;</span>ルート選定
    </button>
    <button class="nav-item" data-view="history">
      <span class="icon">&#x1f4ca;</span>履歴
    </button>
    <button class="nav-item" data-view="analytics">
      <span class="icon">&#x1f4b0;</span>分析
    </button>
    <button class="nav-item" data-view="settings">
      <span class="icon">&#x2699;&#xfe0f;</span>設定
    </button>
  </nav>

  <div id="toast" class="toast"></div>

  <script src="storage.js"></script>
  <script src="api.js"></script>
  <script src="route-optimizer.js"></script>
  <script src="router.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then(reg => {
        // 新バージョン検出時に自動適用
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              nw.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
        // controllerが変わったら一度だけリロードして新コードで表示
        let reloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (reloaded) return;
          reloaded = true;
          location.reload();
        });
      });
    }
  </script>
</body>
</html>
